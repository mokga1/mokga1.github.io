<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가디우스 캐릭터 육성 평가기</title>
</head>
<body>
<div id="app"></div>

<script id="godius-core">
// ============================================================
// 가디우스 게임 데이터 (공식 홈페이지 가이드 기준)
// 수치가 바뀌면 이 GAME 객체만 수정하면 된다.
// ============================================================
const STAT_KEYS = ['STR', 'AGR', 'DEX', 'INT', 'VIT', 'MEN'];
const STAT_LABELS = {
  STR: 'STR (힘)', AGR: 'AGR (민첩)', DEX: 'DEX (손재주)',
  INT: 'INT (지혜)', VIT: 'VIT (활력)', MEN: 'MEN (정신력)',
};

const GAME = {
  jobs: {
    warrior: { name: '전사',   base: { STR: 12, AGR: 6, DEX: 10, INT: 6,  VIT: 6,  MEN: 6  },
      skills: ['검술', '부술', '둔기술', '격술', '회피술'], keyStats: ['STR', 'VIT'] },
    fighter: { name: '검투사', base: { STR: 12, AGR: 6, DEX: 6,  INT: 6,  VIT: 12, MEN: 6  },
      skills: ['부술', '둔기술', '회피술', '창술', '암살검술', '격술'], keyStats: ['STR', 'VIT'] },
    thief:   { name: '도둑',   base: { STR: 6,  AGR: 6, DEX: 6,  INT: 6,  VIT: 6,  MEN: 6  },
      skills: ['부술', '암살검술', '회피술', '함정발견', '해체술', '연막치기', '떨어뜨리기'], keyStats: ['DEX', 'AGR'] },
    wizard:  { name: '마법사', base: { STR: 6,  AGR: 6, DEX: 6,  INT: 12, VIT: 6,  MEN: 10 },
      skills: ['격술', '화염마법', '냉동마법', '중성마법'], keyStats: ['VIT', 'MEN', 'INT'] },
    cleric:  { name: '성직자', base: { STR: 6,  AGR: 6, DEX: 6,  INT: 10, VIT: 6,  MEN: 12 },
      skills: ['둔기술', '신성마법', '중성마법'], keyStats: ['VIT', 'MEN', 'INT'] },
  },
  subJobs: {
    warrior:    { name: '전사',     skills: ['검술', '부술', '둔기술', '격술', '회피술'] },
    thief:      { name: '도둑',     skills: ['부술', '암살검술', '회피술', '함정발견', '해체술', '연막치기', '떨어뜨리기'] },
    alchemist:  { name: '연금술사', skills: ['부술', '화학', '응급처치'] },
    cleric:     { name: '성직자',   skills: ['둔기술', '신성마법', '중성마법'] },
    tailor:     { name: '재봉사',   skills: ['검술', '옷제작', '옷수선'] },
    blacksmith: { name: '대장장이', skills: ['둔기술', '무기제작', '무기수선'] },
    bard:       { name: '바드',     skills: ['창술', '주가'] },
  },
  // 주직업별 선택 불가 보조직업 (검투사는 성직자/연금술사 불가) + 주직업과 동일 보조 불가
  subJobBlock: { fighter: ['cleric', 'alchemist'] },
  totalInitial: 72,        // 생성 시 전체 파라메터 합
  creationMaxPerStat: 15,  // 생성 시 스탯당 최대치
  statMax: 30,             // 파라메터 최대치
  skillMax: 30,            // 기능 최대 레벨
  // 레벨업 시 힘의구슬 획득: [구간 시작, 구간 끝, 획득 개수]
  orbTable: [[2, 10, 3], [11, 30, 2], [31, 50, 4], [51, 70, 5], [71, 80, 6], [81, 90, 7], [91, 999, 8]],
  // 파라메터 상승 비용: [목표 수치 상한, 필요 구슬] — 실패 없음
  paramCostTiers: [[15, 1], [20, 3], [25, 4], [30, 5]],
  // 기능훈련 확률성 성공률: [목표 기능레벨 상한, 성공률] — 근사치
  skillRate: [[5, 0.9], [10, 0.8], [15, 0.5], [20, 0.3], [25, 0.1], [30, 0.08]],
};

// ============================================================
// 순수 계산 함수 (DOM 의존 없음 — Node에서도 실행 가능)
// ============================================================
function orbsAtLevel(level) {
  const row = GAME.orbTable.find(([lo, hi]) => level >= lo && level <= hi);
  return row ? row[2] : 0;
}

function earnedOrbs(level) {
  let total = 0;
  for (let l = 2; l <= level; l++) total += orbsAtLevel(l);
  return total;
}

function paramUpCost(target) {
  return GAME.paramCostTiers.find(([max]) => target <= max)[1];
}

function rawStatCost(base, cur) {
  let cost = 0;
  for (let v = base + 1; v <= cur; v++) cost += paramUpCost(v);
  return cost;
}

// 초기 배분(보너스 포인트)은 유저에게 유리한 쪽으로 추정:
// 생성 시 배분 가능한 포인트는 전부 15 이하(=1개짜리)이므로
// 현재 스탯 기준 배치 가능한 만큼 1개씩 절약된 것으로 계산한다.
function paramCost(jobKey, stats) {
  const base = GAME.jobs[jobKey].base;
  const raw = STAT_KEYS.reduce((s, k) => s + rawStatCost(base[k], stats[k]), 0);
  const baseSum = STAT_KEYS.reduce((s, k) => s + base[k], 0);
  const bonus = GAME.totalInitial - baseSum;
  const placeable = STAT_KEYS.reduce(
    (s, k) => s + Math.max(0, Math.min(GAME.creationMaxPerStat, stats[k]) - base[k]), 0);
  return { cost: raw - Math.min(bonus, placeable), bonus, placeable };
}

function skillRateAt(target) {
  return GAME.skillRate.find(([max]) => target <= max)[1];
}

// 이론 최소: 모든 훈련이 1트에 성공했을 때 (레벨당 1개)
function skillMinCost(skillLevels) {
  return Object.values(skillLevels).reduce((s, v) => s + Math.max(0, v - 1), 0);
}

// 평균 기대치: 확률성 훈련의 기대 소모량 (성공률 역수의 합)
function skillExpectedCost(skillLevels) {
  let total = 0;
  for (const lv of Object.values(skillLevels)) {
    for (let v = 2; v <= lv; v++) total += 1 / skillRateAt(v);
  }
  return total;
}

function gradeOf(ratio) {
  if (ratio >= 1.3) return 'S';
  if (ratio >= 1.1) return 'A';
  if (ratio >= 0.9) return 'B';
  if (ratio >= 0.7) return 'C';
  if (ratio >= 0.5) return 'D';
  return 'F';
}

// input: { mainJob, subJob, level, stats:{...}, skills:{기능명:레벨}, unspent }
function evaluate(input) {
  const errors = [];
  const warnings = [];
  const job = GAME.jobs[input.mainJob];
  const sub = GAME.subJobs[input.subJob];

  if (!job) errors.push('주직업을 선택하세요.');
  if (!sub) errors.push('보조직업을 선택하세요.');
  if (job && sub) {
    if (input.mainJob === input.subJob) errors.push('주직업과 보조직업은 같을 수 없습니다.');
    if ((GAME.subJobBlock[input.mainJob] || []).includes(input.subJob)) {
      errors.push(`${job.name}은(는) 보조직업으로 ${sub.name}를 선택할 수 없습니다.`);
    }
  }
  if (!Number.isInteger(input.level) || input.level < 2 || input.level > 99) {
    errors.push('레벨은 2~99 사이의 정수여야 합니다.');
  }
  if (job) {
    for (const k of STAT_KEYS) {
      const v = input.stats[k];
      if (!Number.isInteger(v) || v < job.base[k] || v > GAME.statMax) {
        errors.push(`${STAT_LABELS[k]}은(는) ${job.base[k]}~${GAME.statMax} 사이여야 합니다.`);
      }
    }
    if (errors.length === 0) {
      const capSum = STAT_KEYS.reduce((s, k) => s + Math.min(GAME.creationMaxPerStat, input.stats[k]), 0);
      if (capSum < GAME.totalInitial) {
        errors.push(`파라메터 입력이 생성 시 배분(합 ${GAME.totalInitial})과 모순됩니다. 현재 파라메터를 다시 확인하세요.`);
      }
    }
  }
  for (const [name, lv] of Object.entries(input.skills || {})) {
    if (!Number.isInteger(lv) || lv < 1 || lv > GAME.skillMax) {
      errors.push(`기능 [${name}] 레벨은 1~${GAME.skillMax} 사이여야 합니다.`);
    }
  }
  const unspent = input.unspent || 0;
  if (!Number.isInteger(unspent) || unspent < 0) errors.push('미사용 힘의구슬은 0 이상의 정수여야 합니다.');
  if (errors.length) return { ok: false, errors, warnings };

  const earned = earnedOrbs(input.level);
  const pc = paramCost(input.mainJob, input.stats);
  const skillMin = skillMinCost(input.skills);
  const skillExpected = skillExpectedCost(input.skills);
  const skillActual = earned - pc.cost - unspent;

  if (skillActual < 0) {
    return {
      ok: false, warnings,
      errors: [`획득 가능한 구슬(${earned}개)보다 많이 소비된 캐릭터입니다. 레벨·파라메터·미사용 구슬 입력을 확인하세요.`],
    };
  }

  let adjusted = skillActual;
  if (skillActual < skillMin) {
    warnings.push('기능 레벨 대비 소비한 구슬이 이론 최소보다 적습니다. 퀘스트·이벤트 등으로 구슬을 추가 획득한 것으로 보고 최상 효율로 평가합니다.');
    adjusted = skillMin;
  }

  let grade;
  let ratio = null;
  if (skillMin === 0) {
    grade = adjusted <= 0 ? 'HOLD' : 'F'; // 기능 투자 없음: 비축형 또는 전량 소실
    if (grade === 'F') ratio = 0;
  } else {
    ratio = skillExpected / adjusted;
    grade = gradeOf(ratio);
  }

  return {
    ok: true, errors, warnings,
    earned, paramCost: pc.cost, bonus: pc.bonus, unspent,
    skillMin, skillExpected, skillActual, adjustedSkillSpend: adjusted,
    wasted: Math.max(0, adjusted - skillMin),   // 실패로 소실된 것으로 추정되는 구슬
    savedOrbs: skillExpected - adjusted,        // 평균 유저 대비 절약분 (음수 = 초과 소모)
    ratio, grade,
  };
}

const GodiusCalc = {
  GAME, STAT_KEYS, STAT_LABELS,
  orbsAtLevel, earnedOrbs, paramUpCost, rawStatCost, paramCost,
  skillRateAt, skillMinCost, skillExpectedCost, gradeOf, evaluate,
};
if (typeof globalThis !== 'undefined') globalThis.GodiusCalc = GodiusCalc;
</script>
</body>
</html>
